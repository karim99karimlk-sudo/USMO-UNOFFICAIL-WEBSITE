<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Highlights</title>

<style>
body{
    margin:0;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

iframe{
    width:90%;
    max-width:1100px;
    aspect-ratio:16/9;
    border:none;
    border-radius:10px;
}
</style>
</head>
<body>

<iframe id="player"
        allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
</iframe>

<script>
const params = new URLSearchParams(window.location.search);
const video = params.get("v");

if(video){
    document.getElementById("player").src =
        `https://www.youtube.com/embed/${video}?autoplay=1`;
}else{
    document.body.innerHTML = "<h2 style='color:white'>Video not found.</h2>";
}
</script>

</body>
</html>
