<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="USMO IMG/logo/cropped_circle_image.png" type="image/x-icon">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Oi&display=swap" rel="stylesheet">
    <title>Squad List - Flexbox</title>
  <style>

    body{
  margin: 0;
  padding: 0;

}
a{
  text-decoration: none;
  color: white;
}
       header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 100px;
      background: rgb(0, 0, 0);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 32px;
      font-family: 'Oi', sans-serif;
    }


    /* NAV */
    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
    }

    nav a {
      text-decoration: none;
      color: rgb(255, 255, 255);
      font-family: 'Poppins', sans-serif;
    font-weight: bold;
    font-size: 18px;
    }

    .hover-underline {
  position: relative;
  color: white;
  text-decoration: none;
}

.hover-underline::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0;
  height: 2px;
  background-color: white;
  transition: width 0.3s ease;
}

.hover-underline:hover::after {
  width: 100%;
}

    
    /* ICONS */
    .header-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #menu-toggle {
      display: none;
      cursor: pointer;
      font-size: 22px;
    }

    /* 🌍 LANGUAGE */
    .lang-container {
      position: relative;
      cursor: pointer;
    }
    .lang-icon{
      width: 22px;
      height: 22px;
      background: white;
      padding: 10px;
      border-radius: 50%;
      text-align: center;
      display: flex;
      justify-content: center; /* horizontal */
      align-items: center;

    }
    .lang-icon img{
      width: 20px;
    }
    .lang-dropdown {
      position: absolute;
      top: 30px;
      right: 0;
      background: white;
      border: 1px solid #eee;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border-radius: 8px;
      display: none;
      flex-direction: column;
      min-width: 120px;
    }

    .lang-dropdown a {
      padding: 10px;
      text-decoration: none;
      color: black;
      text-align: center;
    }

    .lang-dropdown a:hover {
      background: #f5f5f5;
    }

    .lang-dropdown.active {
      display: flex;
    }

    #close-menu {
      display: none;
     }
    /* 📱 MOBILE */
@media (max-width: 906px) {

      header{
        padding: 15px 20px;
      }

  /* SIDEBAR NAV */
  nav {
    position: fixed;
    top: 0;
    left: -100%; /* hidden */
    width: 90%;
    height: 100vh;
    background: black;
    transition: 0.4s ease;
    z-index: 2000;
    padding-top: 80px;
  }

  nav.active {
    left: 0; /* slide in */
  }

  nav ul {
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  nav a {
    color: white;
    font-size: 20px;
  }

  /* ☰ hidden on desktop already */
  #menu-toggle {
    display: block;
  }

  /*  CLOSE BUTTON */
  #close-menu {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    color: white;
    cursor: pointer;
    display: block;
  }
}

    @media (max-width: 768px) {

      header{
        padding: 15px 20px;
      }

  .logo{
    font-size: 1.6rem;
  }
  /* SIDEBAR NAV */
  nav {
    position: fixed;
    top: 0;
    left: -100%; /* hidden */
    width: 90%;
    height: 100vh;
    background: black;
    transition: 0.4s ease;
    z-index: 2000;
    padding-top: 80px;
  }

  nav.active {
    left: 0; /* slide in */
  }

  nav ul {
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  nav a {
    color: white;
    font-size: 20px;
    
  }

  /* ☰ hidden on desktop already */
  #menu-toggle {
    display: block;
  }

  /*  CLOSE BUTTON */
  #close-menu {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    color: white;
    cursor: pointer;
    display: block;
  }
}

  </style>
  </head>
<body>
<header>
  <div class="logo">
   <a href="index.html">الإتحاد</a>
  </div>

  <nav id="nav">
    <i class="fa-solid fa-xmark close-menu" id="close-menu"></i>
    <ul>
      <li><a class="hover-underline" href="academy.html">المدرسة</a></li>
      <li><a class="hover-underline" href="history.html">التاريخ</a></li>
      <li><a class="hover-underline" href="team.html">الفريق</a></li>
      <li><a class="hover-underline" href="schedule.html">الجدول</a></li>
      <li><a class="hover-underline" href="standings.html">الترتيب</a></li>
    </ul>
  </nav>

  <div class="header-icons">
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <!-- 🌍 Language -->
    

    <!-- ☰ Menu -->
    <i class="fa-solid fa-bars" id="menu-toggle"></i>
    
  </div>
</header>
<script>
  
  const menuToggle = document.getElementById("menu-toggle");
  const nav = document.getElementById("nav");



  // ☰ MENU CLICK
  menuToggle.onclick = (e) => {
    e.stopPropagation();
    nav.classList.toggle("active");
  };


  // CLICK OUTSIDE CLOSES EVERYTHING
  document.onclick = () => {
    nav.classList.remove("active");
    langMenu.classList.remove("active");
  };

  const closeMenu = document.getElementById("close-menu");

// OPEN
menuToggle.onclick = (e) => {
  e.stopPropagation();
  nav.classList.add("active");
  langMenu.classList.remove("active");
};

// CLOSE with X
closeMenu.onclick = (e) => {
  e.stopPropagation();
  nav.classList.remove("active");
};


// CLICK OUTSIDE
document.onclick = (e) => {
  if (!nav.contains(e.target) && !menuToggle.contains(e.target)) {
    nav.classList.remove("active");
  }

  if (!langBtn.contains(e.target)) {
    langMenu.classList.remove("active");
  }
};


  </script>

</body>
</html>
