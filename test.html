<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Header</title>


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Cairo",sans-serif;
    background:#f5f5f5;
    padding-top:80px;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    height:80px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    z-index:1000;
    transition:transform .3s ease;
}

header.hide{
    transform:translateY(-100%);
}

.logo a{
    color:#fff;
    text-decoration:none;
    font-size:32px;
    font-weight:bold;
    font-family: Oi;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    color:#fff;
    text-decoration:none;
    font-size:18px;
    position:relative;
}

nav a::after{
    content:"";
    position:absolute;
    right:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:#fff;
    transition:.3s;
}

nav a:hover::after{
    width:100%;
}

.header-icons{
    display:flex;
    align-items:center;
}

#menu-toggle{
    display:none;
    color:#fff;
    font-size:28px;
    cursor:pointer;
}

#close-menu{
    display:none;
}

/* MOBILE */
@media(max-width:768px){

header{
    padding:0 20px;
}

.logo a{
    font-size:26px;
}

#menu-toggle{
    display:block;
}

nav{
    position:fixed;
    top:0;
    left:-100%;
    width:80%;
    height:100vh;
    background:#000;
    transition:.35s;
    z-index:2000;
    padding-top:80px;
}

nav.active{
    left:0;
}

nav ul{
    flex-direction:column;
    align-items:center;
    gap:35px;
}

nav a{
    font-size:22px;
}

#close-menu{
    display:block;
    position:absolute;
    top:20px;
    right:20px;
    color:#fff;
    font-size:32px;
    cursor:pointer;
}
}

/* Demo content */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}
</style>
</head>
<body>

<header id="header">

    <div class="logo">
        <a href="#">الإتحاد</a>
    </div>

    <nav id="nav">
        <i class="fa-solid fa-xmark" id="close-menu"></i>

        <ul>
            <li><a href="#">المدرسة</a></li>
            <li><a href="#">التاريخ</a></li>
            <li><a href="#">الفريق</a></li>
            <li><a href="#">الجدول</a></li>
            <li><a href="#">الترتيب</a></li>
        </ul>
    </nav>

    <div class="header-icons">
        <i class="fa-solid fa-bars" id="menu-toggle"></i>
    </div>

</header>

<section>مرر للأسفل</section>
<section>القسم الثاني</section>
<section>القسم الثالث</section>
<section>القسم الرابع</section>

<script>
const header = document.getElementById("header");
const nav = document.getElementById("nav");
const menuToggle = document.getElementById("menu-toggle");
const closeMenu = document.getElementById("close-menu");

let lastScroll = 0;

// Open menu
menuToggle.addEventListener("click", (e)=>{
    e.stopPropagation();
    nav.classList.add("active");
});

// Close menu
closeMenu.addEventListener("click",(e)=>{
    e.stopPropagation();
    nav.classList.remove("active");
});

// Click outside
document.addEventListener("click",(e)=>{
    if(!nav.contains(e.target) && !menuToggle.contains(e.target)){
        nav.classList.remove("active");
    }
});

// Hide / Show header
window.addEventListener("scroll",()=>{

    if(nav.classList.contains("active")) return;

    const currentScroll = window.scrollY;

    if(currentScroll <= 0){
        header.classList.remove("hide");
        return;
    }

    if(currentScroll > lastScroll && currentScroll > 80){
        header.classList.add("hide");
    }else if(currentScroll < lastScroll){
        header.classList.remove("hide");
    }

    lastScroll = currentScroll;
});
</script>

</body>
</html>
