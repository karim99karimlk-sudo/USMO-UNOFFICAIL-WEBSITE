    <title>Squad List - Flexbox</title>
  <style>
    /* Base Reset and Body Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #ffffff; /* Dark background matching the image */
    color: #000000;
    font-family: 'Arial', sans-serif;
    padding: 40px 20px;
}

.squad-container {
    max-width: 1250px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 50px; /* Space between position sections */
}

/* Position Headers */
.position-title {
    font-size: 1.2rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
}

/* Flexbox Layout for the Cards */
.player-list {
    display: flex;
    flex-wrap: wrap;
    gap: 20px; /* Space between cards */
}

/* Individual Player Card */
.player-card {
    /* Calculate width for 4 items per row:
      100% divided by 4, minus the gap space.
      (3 gaps of 20px = 60px. 60px / 4 items = 15px to subtract per card)
    */
    width: calc(25% - 15px); 
    aspect-ratio: 3 / 4; /* Keeps the cards rectangular */
    background: linear-gradient(135deg, #232323 30%, #f9f9f9 100%); /* Bayern red gradient */
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    
    /* Internal Flexbox to align name to bottom */
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    
}

/* Card Typography & Elements */
.player-number {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 2.2rem;
    font-weight: 900;
    z-index: 2;
}

.player-name {
    position: absolute;
    z-index: 2;
    font-size: 1.1rem;
    font-weight: bold;
    line-height: 1.2;
}

/* Placeholder for where the transparent PNGs would go */
.player-image-placeholder img{
  top: 0;
    left: 0;
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    
}

/* --- Responsive Flex Adjustments --- */

/* 3 Cards per row on medium screens */
@media (max-width: 1024px) {
    .player-card {
        width: calc(33.333% - 13.33px); 
    }
}

/* 2 Cards per row on tablets */
@media (max-width: 768px) {
    .player-card {
        width: calc(50% - 10px);
    }
}

/* 1 Card per row on small phones */
@media (max-width: 480px) {
    .player-card {
        width: 100%;
    }
}
  </style>
